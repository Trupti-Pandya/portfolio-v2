name: Production smoke test

# Runs against the LIVE site to catch what a build can't: downtime, redirect
# loops (like the apex<->www loop we hit), and broken SEO/health endpoints.
on:
  # After each successful Vercel production deployment (Vercel reports these to
  # GitHub as deployment_status events).
  deployment_status:
  # Safety net + manual trigger.
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Live site checks
    # For deployment_status, only run on success + production.
    if: >
      github.event_name != 'deployment_status' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment == 'Production')
    runs-on: ubuntu-latest
    env:
      SITE: https://truptipandya.dev
    steps:
      - name: Homepage reachable, no redirect loop, correct title
        run: |
          set -euo pipefail
          echo "Checking $SITE ..."
          read -r status redirects final < <(curl -sL --max-time 30 \
            -o page.html -w "%{http_code} %{num_redirects} %{url_effective}" "$SITE")
          echo "status=$status redirects=$redirects final=$final"
          [ "$status" = "200" ] || { echo "::error::homepage not 200 (got $status)"; exit 1; }
          [ "$redirects" -lt 5 ] || { echo "::error::too many redirects ($redirects) — possible loop"; exit 1; }
          grep -q "Trupti Pandya" page.html || { echo "::error::homepage missing expected title"; exit 1; }

      - name: SEO + health endpoints reachable
        run: |
          set -euo pipefail
          for path in /robots.txt /sitemap.xml /opengraph-image /api/health; do
            code=$(curl -sL --max-time 30 -o /dev/null -w "%{http_code}" "$SITE$path")
            echo "$path -> $code"
            [ "$code" = "200" ] || { echo "::error::$path returned $code"; exit 1; }
          done

      - name: Health endpoint reports ok
        run: |
          set -euo pipefail
          body=$(curl -sL --max-time 30 "$SITE/api/health")
          echo "$body"
          echo "$body" | grep -q '"status":"ok"' || { echo "::error::health status not ok"; exit 1; }
